<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover, maximum-scale=1.0, user-scalable=no" />
<meta http-equiv="Cache-Control" content="no-cache, no-store, must-revalidate" />
<meta http-equiv="Pragma" content="no-cache" />
<meta http-equiv="Expires" content="0" />
<title>Number Lab — Math Practice</title>
<link rel="manifest" href="/manifest.json" />
<meta name="theme-color" content="#ff5747" />
<link rel="icon" type="image/svg+xml" href="/static/icon.svg" />
<link rel="preconnect" href="https://fonts.googleapis.com" />
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
<link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@400;500;600;700&family=Figtree:wght@400;500;600;700&family=Fredoka:wght@400;500;600;700&display=swap" rel="stylesheet" />
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; -webkit-tap-highlight-color: transparent; }
  html, body { height: 100%; }
  body {
    background: var(--bg, #f4f1ea);
    font-family: var(--body-font, sans-serif);
    color: var(--ink, #1a1512);
    overscroll-behavior: none;
  }
  button { font-family: inherit; cursor: pointer; border: none; background: none; color: inherit; }
  .display { font-family: var(--display-font); font-feature-settings: "tnum" 1; }

  .app-root { min-height: 100dvh; background: var(--bg); display: flex; justify-content: center; transition: background .4s ease; }
  .stage {
    width: 100%; max-width: 560px; min-height: 100dvh; background: var(--app);
    position: relative; display: flex; flex-direction: column;
    transition: background .4s ease;
  }
  @media (min-width: 620px) {
    .app-root { align-items: flex-start; padding: 0; }
    .stage { box-shadow: 0 0 90px -40px rgba(0,0,0,.5); }
  }
  .screen { flex: 1; display: flex; flex-direction: column; padding: clamp(18px, 5vw, 30px); }

  /* ---------- HOME ---------- */
  .home { gap: 22px; padding-bottom: 30px; }
  .home-head { display: flex; align-items: center; justify-content: space-between; gap: 12px; padding-top: max(8px, env(safe-area-inset-top)); }
  .brand { display: flex; align-items: center; gap: 13px; }
  .brand-mark {
    width: 50px; height: 50px; border-radius: 16px; background: var(--accent); color: var(--accent-ink);
    display: grid; place-items: center; font-family: var(--display-font); font-weight: 700; font-size: 24px;
    position: relative; box-shadow: var(--key-shadow);
  }
  .brand-mark span { position: absolute; right: 7px; bottom: 4px; font-size: 13px; opacity: .85; }
  .brand-name { font-family: var(--display-font); font-size: 23px; font-weight: 700; letter-spacing: -.02em; }
  .brand-sub { font-size: 13px; color: var(--muted); margin-top: 1px; }
  .theme-toggle {
    display: flex; align-items: center; gap: 8px; padding: 8px 13px; border-radius: 999px;
    background: var(--surface); border: 1.5px solid var(--line); font-size: 13px; font-weight: 600; color: var(--ink);
  }
  .theme-dots { display: flex; }
  .theme-dots i { width: 11px; height: 11px; border-radius: 50%; display: block; margin-left: -4px; border: 1.5px solid var(--surface); }
  .theme-dots i:first-child { margin-left: 0; }

  /* score strip on home */
  .score-strip { display: flex; align-items: center; justify-content: space-between; gap: 14px; background: var(--surface); border: 2px solid var(--line); border-radius: var(--radius); padding: 16px 20px; }
  .score-main { display: flex; flex-direction: column; gap: 1px; }
  .score-total { font-size: 34px; font-weight: 700; color: var(--accent); line-height: 1; letter-spacing: -.02em; }
  .score-total-label { font-size: 12px; color: var(--muted); font-weight: 500; text-transform: uppercase; letter-spacing: .06em; }
  .score-sub { display: flex; gap: 10px; }
  .score-chip { display: flex; flex-direction: column; align-items: center; gap: 1px; min-width: 56px; padding: 8px 6px; background: var(--bg); border-radius: var(--radius-sm); }
  .score-chip b { font-family: var(--display-font); font-size: 18px; font-weight: 600; }
  .score-chip small { font-size: 10.5px; color: var(--muted); }

  .block { display: flex; flex-direction: column; gap: 11px; }
  .block-label { font-size: 13px; font-weight: 600; color: var(--muted); text-transform: uppercase; letter-spacing: .06em; }

  .op-grid { display: grid; grid-template-columns: repeat(3, 1fr); gap: 10px; }
  .op-card {
    display: flex; flex-direction: column; align-items: center; gap: 9px; padding: 16px 8px;
    background: var(--surface); border: 2px solid var(--line); border-radius: var(--radius-sm); color: var(--ink);
    transition: transform .12s ease, border-color .15s, background .15s;
  }
  .op-card .op-ico { color: var(--muted); transition: color .15s; }
  .op-name { font-size: 13px; font-weight: 600; }
  .op-card:active { transform: scale(.96); }
  .op-card.is-on { border-color: var(--accent); background: var(--accent-soft); }
  .op-card.is-on .op-ico { color: var(--accent); }
  [data-theme-dark="1"] .op-card.is-on { color: #fff; }

  .lvl-list { display: flex; flex-direction: column; gap: 9px; }
  .lvl-row {
    display: flex; align-items: center; gap: 14px; padding: 14px 16px;
    background: var(--surface); border: 2px solid var(--line); border-radius: var(--radius-sm); text-align: left;
    transition: border-color .15s, background .15s, transform .12s;
  }
  .lvl-row:active { transform: scale(.99); }
  .lvl-row.is-on { border-color: var(--accent); background: var(--accent-soft); }
  .lvl-pips { display: flex; gap: 4px; }
  .lvl-pips i { width: 7px; height: 18px; border-radius: 4px; background: var(--line); }
  .lvl-row.is-on .lvl-pips i.on { background: var(--accent); }
  .lvl-pips i.on { background: var(--muted); }
  .lvl-text { flex: 1; display: flex; flex-direction: column; }
  .lvl-text b { font-size: 16px; font-weight: 600; }
  .lvl-text small { font-size: 12.5px; color: var(--muted); }
  .lvl-mode { font-size: 11.5px; font-weight: 600; color: var(--muted); border: 1.5px solid var(--line); padding: 4px 9px; border-radius: 999px; }
  .lvl-row.is-on .lvl-mode { color: var(--accent); border-color: var(--accent); }

  .home-foot { margin-top: auto; display: flex; flex-direction: column; gap: 12px; padding-top: 8px; }
  .home-foot-meta { display: flex; align-items: center; justify-content: center; gap: 8px; font-size: 13px; color: var(--muted); font-weight: 500; flex-wrap: wrap; }
  .home-foot-meta i { opacity: .5; }

  .btn-primary {
    display: inline-flex; align-items: center; justify-content: center; gap: 9px;
    background: var(--accent); color: var(--accent-ink); font-weight: 600; font-size: 16px;
    border-radius: var(--radius-sm); padding: 15px 22px; box-shadow: var(--key-shadow);
    transition: transform .12s ease, filter .15s;
  }
  .btn-primary.big { width: 100%; font-size: 18px; padding: 18px; border-radius: var(--radius); }
  .btn-primary:active { transform: translateY(2px); box-shadow: none; }
  .btn-primary:hover { filter: brightness(1.04); }
  .btn-ghost { padding: 14px; font-weight: 600; font-size: 15px; color: var(--muted); border-radius: var(--radius-sm); }
  .btn-ghost:hover { color: var(--ink); }

  /* ---------- ROUND ---------- */
  .round { gap: 16px; }
  .round-head { display: flex; align-items: center; justify-content: space-between; gap: 12px; padding-top: max(4px, env(safe-area-inset-top)); }
  .icon-btn { width: 42px; height: 42px; border-radius: 13px; background: var(--surface); border: 1.5px solid var(--line); display: grid; place-items: center; color: var(--ink); }
  .icon-btn:active { transform: scale(.94); }
  .round-meta { display: flex; flex-direction: column; align-items: center; line-height: 1.25; }
  .round-op { font-weight: 600; font-size: 15px; }
  .round-lvl { font-size: 12.5px; color: var(--muted); }
  .round-points { display: flex; flex-direction: column; align-items: flex-end; min-width: 52px; }
  .round-points b { font-family: var(--display-font); font-size: 20px; color: var(--accent); line-height: 1; }
  .round-points small { font-size: 11px; color: var(--muted); }

  .progress-track { display: flex; gap: 5px; }
  .seg { flex: 1; height: 8px; border-radius: 4px; background: var(--line); transition: background .3s; }
  .seg-active { background: var(--accent); }
  .seg-done { background: var(--good); }
  .seg-retry { background: var(--gold); }
  .round-count { text-align: center; font-size: 13px; color: var(--muted); font-weight: 500; margin-top: -6px; }

  /* time / speed-bonus bar */
  .timebar { display: flex; align-items: center; gap: 9px; margin-top: 2px; }
  .timebar-ico { color: var(--muted); display: grid; place-items: center; flex-shrink: 0; }
  .timebar-track { flex: 1; height: 7px; border-radius: 4px; background: var(--line); overflow: hidden; }
  .timebar-fill { height: 100%; border-radius: 4px; background: var(--gold); transition: width .12s linear; }
  .timebar-fill.is-low { background: var(--bad); }
  .timebar-bonus { font-size: 14px; font-weight: 700; color: var(--gold); min-width: 42px; text-align: right; flex-shrink: 0; }
  .timebar-bonus.is-low { color: var(--bad); }

  .q-card {
    flex: 1; min-height: 180px; display: flex; flex-direction: column; align-items: center; justify-content: center; gap: 6px;
    background: var(--surface); border: 2px solid var(--line); border-radius: var(--radius);
    box-shadow: var(--card-shadow); padding: 24px; transition: border-color .25s;
  }
  .q-expr { font-family: var(--display-font); font-weight: 600; letter-spacing: -.01em; text-align: center; line-height: 1.08; text-wrap: balance; }
  .q-expr.q-len-sm { font-size: clamp(38px, 11.5vw, 58px); }
  .q-expr.q-len-md { font-size: clamp(32px, 9vw, 46px); }
  .q-expr.q-len-lg { font-size: clamp(26px, 7vw, 38px); }
  .q-eq { font-family: var(--display-font); font-size: 26px; color: var(--muted); }
  .q-answer { min-height: 64px; display: grid; place-items: center; }
  .q-typed { font-family: var(--display-font); font-weight: 700; font-size: clamp(44px, 14vw, 64px); color: var(--accent); line-height: 1; }
  .q-typed.q-empty { color: var(--line); }
  .q-card.q-solved { border-color: var(--good); }
  .q-card.q-solved .q-typed { color: var(--good); }
  .q-card.q-shake { animation: shake .4s ease; }
  @keyframes shake { 0%,100%{transform:translateX(0)} 20%{transform:translateX(-8px)} 40%{transform:translateX(7px)} 60%{transform:translateX(-5px)} 80%{transform:translateX(3px)} }

  .answer-zone { display: flex; flex-direction: column; gap: 12px; padding-bottom: max(4px, env(safe-area-inset-bottom)); }

  .feedback { display: flex; align-items: center; justify-content: center; gap: 8px; font-weight: 600; font-size: 15px; padding: 11px; border-radius: var(--radius-sm); animation: pop-in .25s ease; }
  .feedback-good { background: var(--good-soft); color: var(--good); }
  .feedback-bad { background: var(--bad-soft); color: var(--bad); }
  .feedback-icon { display: grid; place-items: center; }
  @keyframes pop-in { from { opacity: 0; transform: translateY(6px) scale(.96); } to { opacity: 1; transform: none; } }

  .hint { display: flex; align-items: flex-start; gap: 9px; font-size: 14.5px; line-height: 1.4; color: var(--ink); background: var(--accent-soft); border-radius: var(--radius-sm); padding: 12px 14px; animation: pop-in .25s ease; }
  [data-theme-dark="1"] .hint { color: var(--ink); }
  .hint-tag { flex-shrink: 0; font-size: 11px; font-weight: 700; text-transform: uppercase; letter-spacing: .05em; color: var(--accent); background: var(--surface); padding: 3px 8px; border-radius: 999px; margin-top: 1px; }

  .choice-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; }
  .choice {
    font-family: var(--display-font); font-weight: 600; font-size: 28px; padding: 20px; border-radius: var(--radius-sm);
    background: var(--surface); border: 2px solid var(--line); color: var(--ink); box-shadow: var(--key-shadow);
    transition: transform .1s, background .15s, border-color .15s, opacity .2s;
  }
  .choice:active { transform: translateY(2px); box-shadow: none; }
  .choice:hover:not(:disabled) { border-color: var(--accent); }
  .choice-elim { opacity: .32; box-shadow: none; pointer-events: none; }
  .choice-correct { background: var(--good); border-color: var(--good); color: #fff; box-shadow: none; }
  .choice-wrong { background: var(--bad-soft); border-color: var(--bad); color: var(--bad); }

  .keypad { display: grid; grid-template-columns: repeat(3, 1fr); gap: 9px; }
  .key {
    font-family: var(--display-font); font-weight: 600; font-size: 26px; padding: 16px 0; border-radius: var(--radius-sm);
    background: var(--pad-bg); border: 1.5px solid var(--line); color: var(--ink); box-shadow: var(--key-shadow);
    min-height: 58px; transition: transform .08s, background .15s;
  }
  .key:active { transform: translateY(2px); box-shadow: none; background: var(--accent-soft); }
  .key-util { color: var(--muted); }
  .key-submit { grid-column: 1 / -1; background: var(--accent); color: var(--accent-ink); font-size: 19px; padding: 17px; }
  .key:disabled { opacity: .5; }

  /* ---------- RESULTS ---------- */
  .results { align-items: center; justify-content: center; position: relative; overflow: hidden; }
  .results-card { width: 100%; max-width: 420px; display: flex; flex-direction: column; align-items: center; text-align: center; gap: 6px; z-index: 2; }
  .star-row { display: flex; gap: 8px; margin-bottom: 6px; }
  .results-title { font-family: var(--display-font); font-size: clamp(30px, 8vw, 40px); font-weight: 700; letter-spacing: -.02em; margin-top: 4px; }
  .results-sub { color: var(--muted); font-size: 15px; margin-bottom: 18px; }

  .round-score-box { width: 100%; background: var(--accent-soft); border-radius: var(--radius); padding: 18px; display: flex; flex-direction: column; align-items: center; gap: 10px; margin-bottom: 12px; }
  .round-score-num { font-size: 44px; font-weight: 700; color: var(--accent); line-height: 1; letter-spacing: -.02em; }
  .round-score-breakdown { display: flex; flex-wrap: wrap; justify-content: center; gap: 6px; }
  .bd-item { font-size: 12.5px; font-weight: 600; padding: 5px 10px; border-radius: 999px; background: var(--surface); }
  .bd-good { color: var(--good); }
  .bd-time { color: var(--gold); }
  .bd-bad { color: var(--bad); }

  .total-banner { width: 100%; display: flex; align-items: center; justify-content: space-between; padding: 14px 18px; border: 2px solid var(--line); border-radius: var(--radius-sm); margin-bottom: 20px; }
  .total-banner-label { font-size: 13px; color: var(--muted); font-weight: 600; text-transform: uppercase; letter-spacing: .05em; }
  .total-banner-val { font-size: 26px; font-weight: 700; color: var(--ink); line-height: 1; }
  .stat-grid { width: 100%; display: grid; grid-template-columns: 1fr 1fr; gap: 10px; margin-bottom: 24px; }
  .stat { background: var(--surface); border: 1.5px solid var(--line); border-radius: var(--radius-sm); padding: 16px; display: flex; flex-direction: column; gap: 3px; }
  .stat-big { grid-column: 1 / -1; background: var(--accent-soft); border-color: transparent; }
  .stat-big .stat-value { color: var(--accent); }
  .stat-value { font-family: var(--display-font); font-weight: 700; font-size: 30px; line-height: 1; }
  .stat-label { font-size: 12.5px; color: var(--muted); font-weight: 500; }
  .results-actions { width: 100%; display: flex; flex-direction: column; gap: 6px; }

  @keyframes star-pop { 0% { transform: scale(0) rotate(-30deg); opacity: 0; } 100% { transform: none; opacity: 1; } }

  .confetti { position: absolute; inset: 0; pointer-events: none; overflow: hidden; z-index: 1; }
  .confetti span { position: absolute; top: -20px; border-radius: 2px; animation-name: fall; animation-timing-function: linear; animation-fill-mode: forwards; }
  @keyframes fall { to { transform: translateY(115vh) rotate(540deg); opacity: .9; } }

  /* ---------- PWA install button ---------- */
  .install-fab {
    position: fixed; bottom: 20px; right: 20px; z-index: 100;
    display: none; align-items: center; gap: 8px;
    background: var(--accent); color: var(--accent-ink);
    border: none; border-radius: 999px; padding: 12px 18px;
    font-size: 14px; font-weight: 600; box-shadow: 0 4px 20px rgba(0,0,0,.2);
    cursor: pointer;
  }
</style>
</head>
<body>
  <div id="root"></div>
  <button id="install-btn" class="install-fab">Install app</button>

  <script src="https://unpkg.com/react@18.3.1/umd/react.development.js" crossorigin="anonymous"></script>
  <script src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.development.js" crossorigin="anonymous"></script>
  <script src="https://unpkg.com/@babel/standalone@7.29.0/babel.min.js" crossorigin="anonymous"></script>

  <script type="text/babel">
{% raw %}
// ============================================================
// THEMES
// ============================================================
const THEMES = {
  pop: {
    id: "pop", label: "Pop", blurb: "Bright & bold",
    swatch: ["#faf8f4", "#ff5747", "#15110e"], dark: false,
    vars: {
      "--bg": "#f4f1ea", "--app": "#fbf9f5", "--surface": "#ffffff",
      "--ink": "#1a1512", "--muted": "#8a8178", "--line": "#e7e1d6",
      "--accent": "#ff5747", "--accent-soft": "#ffe9e5", "--accent-ink": "#ffffff",
      "--good": "#1f9d6b", "--good-soft": "#e1f3ea", "--bad": "#e23b54", "--bad-soft": "#fce3e7",
      "--gold": "#f5a623", "--display-font": "'Space Grotesk', sans-serif",
      "--body-font": "'Figtree', sans-serif", "--radius": "22px", "--radius-sm": "14px",
      "--key-shadow": "0 4px 0 rgba(21,17,14,0.12)", "--card-shadow": "0 18px 50px -28px rgba(21,17,14,0.35)",
      "--pad-bg": "#f1ece2",
    },
  },
  calm: {
    id: "calm", label: "Calm", blurb: "Soft pastel",
    swatch: ["#eef2f6", "#5a9e8b", "#2c3a44"], dark: false,
    vars: {
      "--bg": "#e6ecf1", "--app": "#f4f7fa", "--surface": "#ffffff",
      "--ink": "#27343d", "--muted": "#8095a1", "--line": "#dde6ec",
      "--accent": "#4f9d8a", "--accent-soft": "#e0efea", "--accent-ink": "#ffffff",
      "--good": "#3f9e7c", "--good-soft": "#e2f1ea", "--bad": "#df7b86", "--bad-soft": "#f8e6e8",
      "--gold": "#e0a64e", "--display-font": "'Fredoka', sans-serif",
      "--body-font": "'Figtree', sans-serif", "--radius": "26px", "--radius-sm": "16px",
      "--key-shadow": "0 4px 0 rgba(39,52,61,0.08)", "--card-shadow": "0 22px 60px -34px rgba(39,52,61,0.4)",
      "--pad-bg": "#e8eef2",
    },
  },
  neon: {
    id: "neon", label: "Neon", blurb: "Dark glow",
    swatch: ["#0e1424", "#5fe3c9", "#a78bfa"], dark: true,
    vars: {
      "--bg": "#080c17", "--app": "#0e1424", "--surface": "#161e33",
      "--ink": "#eef2ff", "--muted": "#7f88a8", "--line": "#26304b",
      "--accent": "#5fe3c9", "--accent-soft": "#16302c", "--accent-ink": "#06231d",
      "--good": "#54e6b0", "--good-soft": "#123227", "--bad": "#ff6b8a", "--bad-soft": "#341823",
      "--gold": "#ffd166", "--display-font": "'Space Grotesk', sans-serif",
      "--body-font": "'Figtree', sans-serif", "--radius": "22px", "--radius-sm": "14px",
      "--key-shadow": "0 4px 0 rgba(0,0,0,0.5)", "--card-shadow": "0 24px 70px -30px rgba(0,0,0,0.8)",
      "--pad-bg": "#101729",
    },
  },
};

function applyTheme(el, themeId, accentOverride) {
  const theme = THEMES[themeId] || THEMES.pop;
  Object.entries(theme.vars).forEach(([k, v]) => el.style.setProperty(k, v));
  if (accentOverride) el.style.setProperty("--accent", accentOverride);
  el.dataset.themeDark = theme.dark ? "1" : "0";
}

// ============================================================
// PROBLEMS
// ============================================================
const OPERATIONS = [
  { id: "add", label: "Addition", sign: "+", glyph: "+" },
  { id: "sub", label: "Subtraction", sign: "−", glyph: "−" },
  { id: "mul", label: "Multiplication", sign: "×", glyph: "×" },
  { id: "div", label: "Division", sign: "÷", glyph: "÷" },
  { id: "mix", label: "Mixed", sign: "( )", glyph: "÷×" },
];

const LEVELS = [
  { id: 1, label: "Starter", blurb: "Numbers 1–10", input: "choice" },
  { id: 2, label: "Growing", blurb: "Numbers up to 20", input: "choice" },
  { id: 3, label: "Challenge", blurb: "Bigger numbers", input: "keypad" },
  { id: 4, label: "Master", blurb: "Multi-step & brackets", input: "keypad" },
];

const rnd = (min, max) => Math.floor(Math.random() * (max - min + 1)) + min;
const pick = (arr) => arr[Math.floor(Math.random() * arr.length)];

function answerMode(operationId, level) {
  if (operationId === "mix" && level >= 2) return "keypad";
  return level <= 2 ? "choice" : "keypad";
}

function addProblem(level) {
  let a, b;
  if (level === 1) { a = rnd(1, 9); b = rnd(1, 9); }
  else if (level === 2) { a = rnd(2, 14); b = rnd(2, 18); }
  else if (level === 3) { a = rnd(12, 89); b = rnd(11, 99); }
  else { a = rnd(120, 480); b = rnd(80, 360); }
  return { text: `${a} + ${b}`, answer: a + b, hint: addHint(a, b) };
}

function subProblem(level) {
  let a, b;
  if (level === 1) { a = rnd(3, 10); b = rnd(1, a); }
  else if (level === 2) { a = rnd(8, 20); b = rnd(1, a); }
  else if (level === 3) { a = rnd(25, 99); b = rnd(5, a - 1); }
  else { a = rnd(150, 600); b = rnd(40, a - 20); }
  return { text: `${a} − ${b}`, answer: a - b, hint: subHint(a, b) };
}

function mulProblem(level) {
  let a, b;
  if (level === 1) { a = rnd(1, 5); b = rnd(1, 5); }
  else if (level === 2) { a = rnd(2, 10); b = rnd(2, 9); }
  else if (level === 3) { a = rnd(3, 12); b = rnd(3, 12); }
  else { a = rnd(6, 19); b = rnd(4, 12); }
  return { text: `${a} × ${b}`, answer: a * b, hint: mulHint(a, b) };
}

function divProblem(level) {
  let b, q;
  if (level === 1) { b = rnd(1, 5); q = rnd(1, 5); }
  else if (level === 2) { b = rnd(2, 10); q = rnd(2, 9); }
  else if (level === 3) { b = rnd(3, 12); q = rnd(3, 12); }
  else { b = rnd(4, 12); q = rnd(8, 20); }
  const a = b * q;
  return { text: `${a} ÷ ${b}`, answer: q, hint: divHint(a, b, q) };
}

function mixProblem(level) {
  if (level === 1) {
    const a = rnd(2, 9), b = rnd(1, 9), c = rnd(1, Math.min(a + b, 9));
    return { text: `${a} + ${b} − ${c}`, answer: a + b - c, hint: "Work left to right: first add, then subtract." };
  }
  const templates = [];
  if (level === 2) {
    templates.push(() => { const a = rnd(2, 8), b = rnd(2, 8), c = rnd(2, 5);
      return { text: `(${a} + ${b}) × ${c}`, answer: (a + b) * c, hint: `Solve the brackets first: ${a} + ${b} = ${a + b}.` }; });
    templates.push(() => { const a = rnd(4, 9), b = rnd(1, a - 1), c = rnd(2, 5);
      return { text: `(${a} − ${b}) × ${c}`, answer: (a - b) * c, hint: `Solve the brackets first: ${a} − ${b} = ${a - b}.` }; });
    templates.push(() => { const a = rnd(2, 9), b = rnd(2, 9), c = rnd(1, 9);
      return { text: `${a} × ${b} + ${c}`, answer: a * b + c, hint: `Multiply first: ${a} × ${b} = ${a * b}, then add ${c}.` }; });
  } else if (level === 3) {
    templates.push(() => { const a = rnd(3, 12), b = rnd(2, 9), c = rnd(2, 6);
      return { text: `(${a} + ${b}) × ${c}`, answer: (a + b) * c, hint: `Brackets first: ${a} + ${b} = ${a + b}.` }; });
    templates.push(() => { const c = rnd(2, 6), q = rnd(2, 8), a = c * q, b = rnd(1, 9);
      return { text: `(${a} ÷ ${c}) + ${b}`, answer: q + b, hint: `Brackets first: ${a} ÷ ${c} = ${q}.` }; });
    templates.push(() => { const a = rnd(3, 9), b = rnd(2, 9), c = rnd(2, 9);
      return { text: `${a} × ${b} − ${c}`, answer: a * b - c, hint: `Multiply first: ${a} × ${b} = ${a * b}, then subtract ${c}.` }; });
  } else {
    templates.push(() => { const a = rnd(4, 12), b = rnd(3, 9), c = rnd(2, 6), d = rnd(2, 12);
      return { text: `(${a} + ${b}) × ${c} − ${d}`, answer: (a + b) * c - d, hint: `Brackets first: ${a} + ${b} = ${a + b}, then × ${c}.` }; });
    templates.push(() => { const c = rnd(2, 6), q = rnd(3, 9), a = c * q, b = rnd(2, 9), e = rnd(2, 9);
      return { text: `(${a} ÷ ${c}) × ${b} + ${e}`, answer: q * b + e, hint: `Brackets first: ${a} ÷ ${c} = ${q}.` }; });
    templates.push(() => { const a = rnd(6, 14), b = rnd(3, 9), c = rnd(2, 9), d = rnd(2, 9);
      return { text: `${a} × ${b} − (${c} + ${d})`, answer: a * b - (c + d), hint: `Brackets first: ${c} + ${d} = ${c + d}.` }; });
  }
  return pick(templates)();
}

function addHint(a, b) {
  const big = Math.max(a, b), small = Math.min(a, b);
  if (big < 20) return `Start at ${big}, then count up ${small} more.`;
  return `Add the tens, then the ones.`;
}
function subHint(a, b) {
  if (a < 25) return `Start at ${a} and count back ${b}.`;
  return `Subtract the tens first, then the ones.`;
}
function mulHint(a, b) {
  const small = Math.min(a, b), big = Math.max(a, b);
  if (small <= 5) return `${small} groups of ${big} — add ${big} a total of ${small} times.`;
  return `Think of it as ${small} × ${big}. Skip-count by ${big}.`;
}
function divHint(a, b, q) {
  return `How many ${b}'s fit into ${a}? Count up: ${b}, ${b * 2}, ${b * 3}…`;
}

const GENERATORS = { add: addProblem, sub: subProblem, mul: mulProblem, div: divProblem, mix: mixProblem };

function generateProblem(operationId, level) {
  const p = GENERATORS[operationId](level);
  p.operationId = operationId;
  p.level = level;
  return p;
}

function makeChoices(answer) {
  const set = new Set([answer]);
  const spread = Math.max(2, Math.round(Math.abs(answer) * 0.25)) + 3;
  let guard = 0;
  while (set.size < 4 && guard < 60) {
    guard++;
    const delta = rnd(1, spread) * (Math.random() < 0.5 ? -1 : 1);
    const cand = answer + delta;
    if (cand >= 0 && cand !== answer) set.add(cand);
  }
  let n = answer + 1;
  while (set.size < 4) { if (n >= 0) set.add(n); n++; }
  const arr = Array.from(set);
  for (let i = arr.length - 1; i > 0; i--) {
    const j = Math.floor(Math.random() * (i + 1));
    [arr[i], arr[j]] = [arr[j], arr[i]];
  }
  return arr;
}

function Keypad({ value, onInput, onDelete, onSubmit, disabled, canSubmit }) {
  const keys = ["1", "2", "3", "4", "5", "6", "7", "8", "9", "neg", "0", "del"];
  return (
    <div className="keypad">
      {keys.map((k) => {
        if (k === "del")
          return <button key={k} className="key key-util" onClick={onDelete} disabled={disabled} aria-label="delete">
            <svg width="26" height="26" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round">
              <path d="M20 5H9l-6 7 6 7h11a1 1 0 0 0 1-1V6a1 1 0 0 0-1-1z" />
              <path d="M16 9l-4 4M12 9l4 4" />
            </svg>
          </button>;
        if (k === "neg")
          return <button key={k} className="key key-util" onClick={() => onInput("-")} disabled={disabled} aria-label="minus">&minus;</button>;
        return <button key={k} className="key" onClick={() => onInput(k)} disabled={disabled}>{k}</button>;
      })}
      <button className="key key-submit" onClick={onSubmit} disabled={disabled || !canSubmit}>Check</button>
    </div>
  );
}

function ChoiceGrid({ choices, onPick, disabled, eliminated, picked, answer, locked }) {
  return (
    <div className="choice-grid">
      {choices.map((c, i) => {
        const isElim = eliminated.includes(c);
        let cls = "choice";
        if (isElim) cls += " choice-elim";
        if (locked && c === answer) cls += " choice-correct";
        if (locked && picked === c && c !== answer) cls += " choice-wrong";
        return (
          <button key={i} className={cls} disabled={disabled || isElim} onClick={() => onPick(c)}>{c}</button>
        );
      })}
    </div>
  );
}

function Feedback({ state, message }) {
  if (!state) return null;
  return (
    <div className={`feedback feedback-${state}`}>
      <span className="feedback-icon">
        {state === "good" ? (
          <svg width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="3" strokeLinecap="round" strokeLinejoin="round"><path d="M20 6L9 17l-5-5" /></svg>
        ) : (
          <svg width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="3" strokeLinecap="round"><path d="M18 6L6 18M6 6l12 12" /></svg>
        )}
      </span>
      {message}
    </div>
  );
}

function Confetti({ run }) {
  if (!run) return null;
  const colors = ["var(--accent)", "var(--gold)", "var(--good)", "var(--bad)"];
  const bits = Array.from({ length: 44 });
  return (
    <div className="confetti">
      {bits.map((_, i) => {
        const left = Math.random() * 100;
        const delay = Math.random() * 0.5;
        const dur = 1.6 + Math.random() * 1.4;
        const rot = Math.random() * 360;
        const c = colors[i % colors.length];
        const w = 7 + Math.random() * 7;
        return <span key={i} style={{
          left: left + "%", background: c, width: w, height: w * (0.5 + Math.random()),
          animationDelay: delay + "s", animationDuration: dur + "s", transform: `rotate(${rot}deg)`,
        }} />;
      })}
    </div>
  );
}

function OpIcon({ id, size = 26 }) {

}

/* --- ROUND --- */
function buildStep(op, level) {
  const p = generateProblem(op, level);
  if (answerMode(op, level) === "choice") p.choices = makeChoices(p.answer);
  return p;
}

const PRAISE = ["Correct!", "Nice!", "Perfect!", "Brilliant!", "Well done!", "Exactly!", "Spot on!"];
function pickPraise() { return PRAISE[Math.floor(Math.random() * PRAISE.length)]; }

const REWARD = 10;          // points for a correct answer
const PENALTY = 8;          // points lost per wrong attempt
const TIME_BONUS_MAX = 50;  // max speed bonus per round
const MS_PER_STEP = 8000;   // time window allotted per step before bonus drains

// Speed-bonus bar that drains over the round; the leftover is awarded at finish.
function TimeBar({ windowMs, running, bonusRef }) {
  const [frac, setFrac] = useState(1);
  const startRef = useRef(Date.now());
  useEffect(() => {
    if (!running) return;
    const id = setInterval(() => {
      const f = Math.max(0, 1 - (Date.now() - startRef.current) / windowMs);
      setFrac(f);
      if (bonusRef) bonusRef.current = Math.round(TIME_BONUS_MAX * f);
    }, 90);
    return () => clearInterval(id);
  }, [running]);
  const bonus = Math.round(TIME_BONUS_MAX * frac);
  const low = frac < 0.25;
  return (
    <div className="timebar">
      <span className="timebar-ico" aria-hidden="true">
        <svg width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2.4" strokeLinecap="round" strokeLinejoin="round"><circle cx="12" cy="13" r="8" /><path d="M12 9v4l2 2M9 2h6" /></svg>
      </span>
      <div className="timebar-track">
        <div className={"timebar-fill" + (low ? " is-low" : "")} style={{ width: (frac * 100) + "%" }} />
      </div>
      <span className={"timebar-bonus display" + (low ? " is-low" : "")}>+{bonus}</span>
    </div>
  );
}

function RoundScreen({ config, onFinish, onExit, beep }) {
  const { op, level, roundLength } = config;
  const opMeta = OPERATIONS.find((o) => o.id === op);
  const mode = answerMode(op, level);

  const [stepIndex, setStepIndex] = useState(0);
  const [problem, setProblem] = useState(() => buildStep(op, level));
  const [typed, setTyped] = useState("");
  const [attempts, setAttempts] = useState(0);
  const [feedback, setFeedback] = useState(null);
  const [hintShown, setHintShown] = useState(false);
  const [locked, setLocked] = useState(false);
  const [picked, setPicked] = useState(null);
  const [eliminated, setEliminated] = useState([]);
  const [points, setPoints] = useState(0); // live displayed score (clamped >= 0)

  const statsRef = useRef({ results: [], mistakes: 0, earned: 0, penalty: 0, perfect: 0, start: Date.now() });
  const stats = statsRef.current;
  const bonusRef = useRef(TIME_BONUS_MAX);
  const [finished, setFinished] = useState(false);

  function syncPoints() { setPoints(Math.max(0, stats.earned - stats.penalty)); }

  const advance = useCallback((wasPerfect) => {
    const next = stepIndex + 1;
    if (next >= roundLength) {
      setFinished(true);
      const elapsed = Math.round((Date.now() - stats.start) / 1000);
      const timeBonus = Math.max(0, bonusRef.current);
      const roundScore = stats.earned - stats.penalty + timeBonus;
      onFinish({
        mistakes: stats.mistakes, perfect: stats.perfect, total: roundLength, seconds: elapsed,
        earned: stats.earned, penalty: stats.penalty, timeBonus, roundScore,
        stars: stats.perfect >= roundLength - 1 ? 3 : stats.perfect >= Math.ceil(roundLength * 0.6) ? 2 : 1,
        config,
      });
      return;
    }
    setStepIndex(next);
    setProblem(buildStep(op, level));
    setTyped(""); setAttempts(0); setFeedback(null); setHintShown(false); setLocked(false); setPicked(null); setEliminated([]);
  }, [stepIndex, roundLength]);

  function registerCorrect() {
    const wrong = attempts;
    stats.earned += REWARD;
    if (wrong === 0) stats.perfect += 1;
    stats.results.push(wrong === 0 ? "good" : "retry");
    syncPoints();
    beep(880);
    setLocked(true);
    setFeedback({ state: "good", message: wrong === 0 ? pickPraise() : "Got it!" });
    setTimeout(() => advance(wrong === 0), 850);
  }

  function registerWrong(val) {
    const a = attempts + 1;
    setAttempts(a);
    stats.mistakes += 1;
    stats.penalty += PENALTY;
    syncPoints();
    beep(180);
    if (a >= 2) setHintShown(true);
    setFeedback({ state: "bad", message: a >= 2 ? "Not yet — here’s a hint." : `Try again! −${PENALTY}` });
    if (mode === "choice") setEliminated((e) => [...e, val]);
  }

  function checkAnswer(val) {
    if (locked) return;
    if (val === problem.answer) registerCorrect();
    else registerWrong(val);
  }

  const onInput = (ch) => { if (locked) return; setFeedback(null); setTyped((t) => (t.length < 6 ? t + ch : t)); };
  const onDelete = () => { if (locked) return; setTyped((t) => t.slice(0, -1)); };
  const onSubmit = () => { if (!typed.length || locked) return; checkAnswer(parseInt(typed, 10)); };

  useEffect(() => {
    if (mode !== "keypad") return;
    const h = (e) => {
      if (locked) return;
      if (e.key >= "0" && e.key <= "9") onInput(e.key);
      else if (e.key === "Backspace") onDelete();
      else if (e.key === "Enter") onSubmit();
      else if (e.key === "-") onInput("-");
    };
    window.addEventListener("keydown", h);
    return () => window.removeEventListener("keydown", h);
  }, [mode, locked, typed]);

  const shaking = feedback && feedback.state === "bad";

  return (
    <div className="screen round">
      <header className="round-head">
        <button className="icon-btn" onClick={onExit} aria-label="Back">
          <svg width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2.6" strokeLinecap="round" strokeLinejoin="round"><path d="M15 18l-6-6 6-6" /></svg>
        </button>
        <div className="round-meta">
          <span className="round-op">{opMeta.label}</span>
          <span className="round-lvl">{LEVELS[level - 1].label}</span>
        </div>
        <div className="round-points"><b>{points}</b><small>pts</small></div>
      </header>

      <ProgressTrack total={roundLength} current={stepIndex} results={stats.results} />
      <TimeBar windowMs={roundLength * MS_PER_STEP} running={!finished} bonusRef={bonusRef} />
      <div className="round-count">Step {stepIndex + 1} of {roundLength}</div>

      <div className={"q-card" + (locked ? " q-solved" : "") + (shaking ? " q-shake" : "")}>
        <div className={"q-expr q-len-" + (problem.text.length > 13 ? "lg" : problem.text.length > 9 ? "md" : "sm")}>{problem.text}</div>
        <div className="q-eq">=</div>
        <div className="q-answer">
          {mode === "keypad"
            ? <span className={"q-typed" + (typed ? "" : " q-empty")}>{typed || "?"}</span>
            : <span className="q-typed q-empty">?</span>}
        </div>
      </div>

      <div className="answer-zone">
        {feedback && <Feedback state={feedback.state} message={feedback.message} />}
        {hintShown && !locked && <div className="hint"><span className="hint-tag">Hint</span>{problem.hint}</div>}
        {mode === "choice"
          ? <ChoiceGrid choices={problem.choices} onPick={checkAnswer} disabled={locked} eliminated={eliminated} picked={picked} answer={problem.answer} locked={locked} />
          : <Keypad value={typed} onInput={onInput} onDelete={onDelete} onSubmit={onSubmit} disabled={locked} canSubmit={typed.length > 0} />}
      </div>
    </div>
  );
}

/* --- RESULTS --- */
function ResultsScreen({ data, onReplay, onHome, beep }) {
  const [show, setShow] = useState(false);
  const [shownTotal, setShownTotal] = useState(data.prevTotal);
  useEffect(() => { const t = setTimeout(() => setShow(true), 60); beep(880); return () => clearTimeout(t); }, []);

  // count the lifetime total up (or down) to its new value
  useEffect(() => {
    const from = data.prevTotal, to = data.newTotal;
    if (from === to) { setShownTotal(to); return; }
    const startT = Date.now(), dur = 900;
    const id = setInterval(() => {
      const k = Math.min(1, (Date.now() - startT) / dur);
      const eased = 1 - Math.pow(1 - k, 3);
      setShownTotal(Math.round(from + (to - from) * eased));
      if (k >= 1) clearInterval(id);
    }, 30);
    return () => clearInterval(id);
  }, []);

  const accuracy = Math.round((data.perfect / data.total) * 100);
  const mm = Math.floor(data.seconds / 60), ss = data.seconds % 60;
  const timeStr = mm > 0 ? `${mm}m ${ss}s` : `${ss}s`;
  const headline = data.stars === 3 ? "Outstanding!" : data.stars === 2 ? "Great job!" : "Round complete!";
  const delta = data.roundScore;

  return (
    <div className="screen results">
      <Confetti run={show && data.stars >= 2} />
      <div className="results-card">
        <StarRow count={data.stars} size={46} animate={show} />
        <h2 className="results-title">{headline}</h2>
        <p className="results-sub">You finished all {data.total} steps.</p>

        <div className="round-score-box">
          <div className="round-score-num display">{delta >= 0 ? "+" : "−"}{Math.abs(delta)}</div>
          <div className="round-score-breakdown">
            <span className="bd-item bd-good">+{data.earned} solved</span>
            <span className="bd-item bd-time">+{data.timeBonus} speed</span>
            {data.penalty > 0 && <span className="bd-item bd-bad">−{data.penalty} mistakes</span>}
          </div>
        </div>

        <div className="stat-grid">
          <Stat value={timeStr} label="Time" />
          <Stat value={accuracy + "%"} label="First-try" />
          <Stat value={data.mistakes} label={data.mistakes === 1 ? "Mistake" : "Mistakes"} />
        </div>

        <div className="total-banner">
          <span className="total-banner-label">Total points</span>
          <span className="total-banner-val display">{shownTotal.toLocaleString()}</span>
        </div>

        <div className="results-actions">
          <button className="btn-primary big" onClick={() => { beep(720); onReplay(); }}>Play again</button>
          <button className="btn-ghost" onClick={() => { beep(560); onHome(); }}>Choose another</button>
        </div>
      </div>
    </div>
  );
}
function Stat({ value, label }) {
  return (
    <div className="stat">
      <div className="stat-value">{value}</div>
      <div className="stat-label">{label}</div>
    </div>
  );
}

let _actx = null;
function makeBeeper(enabledRef) {
  return (freq) => {
    if (!enabledRef.current) return;
    try {
      _actx = _actx || new (window.AudioContext || window.webkitAudioContext)();
      const o = _actx.createOscillator(), g = _actx.createGain();
      o.type = "triangle"; o.frequency.value = freq;
      g.gain.setValueAtTime(0.0001, _actx.currentTime);
      g.gain.exponentialRampToValueAtTime(0.12, _actx.currentTime + 0.01);
      g.gain.exponentialRampToValueAtTime(0.0001, _actx.currentTime + 0.18);
      o.connect(g); g.connect(_actx.destination);
      o.start(); o.stop(_actx.currentTime + 0.19);
    } catch (e) {}
  };
}

const ACCENTS = {
  pop:  ["", "#ff5747", "#2f6df0", "#7a52e8", "#16a34a"],
  calm: ["", "#4f9d8a", "#5b86c4", "#c07ab0", "#d9883e"],
  neon: ["", "#5fe3c9", "#a78bfa", "#ff6b8a", "#ffd166"],
};

// ---- persistent cumulative progress ----
const PROGRESS_KEY = "numberlab.progress.v1";
function loadProgress() {
  try {
    const p = JSON.parse(localStorage.getItem(PROGRESS_KEY));
    if (p && typeof p.total === "number") return p;
  } catch (e) {}
  return { total: 0, rounds: 0, best: 0 };
}
function saveProgress(p) {
  try { localStorage.setItem(PROGRESS_KEY, JSON.stringify(p)); } catch (e) {}
}

function App() {
  const [themeId, setThemeId] = useState("pop");
  const [accent, setAccent] = useState("");
  const [roundLength] = useState(10);
  const [sound, setSound] = useState(false);
  const [view, setView] = useState({ name: "home" });
  const [progress, setProgress] = useState(loadProgress);
  const rootRef = useRef(null);
  const soundRef = useRef(false);
  useEffect(() => { soundRef.current = sound; }, [sound]);
  const beep = useMemo(() => makeBeeper(soundRef), []);

  useEffect(() => {
    if (rootRef.current) applyTheme(rootRef.current, themeId, accent);
  }, [themeId, accent]);

  const cycleTheme = () => {
    const order = ["pop", "calm", "neon"];
    const next = order[(order.indexOf(themeId) + 1) % order.length];
    setThemeId(next);
    setAccent("");
  };

  const startRound = (op, level) => setView({ name: "round", config: { op, level, roundLength } });

  const finishRound = (data) => {
    // roundScore can be negative when mistakes outweigh earnings; lifetime clamps at 0
    const prevTotal = progress.total;
    const newTotal = Math.max(0, prevTotal + data.roundScore);
    const next = {
      total: newTotal,
      rounds: progress.rounds + 1,
      best: Math.max(progress.best, data.roundScore),
    };
    setProgress(next);
    saveProgress(next);
    setView({ name: "results", data: { ...data, prevTotal, newTotal } });
  };

  const replay = () => { const c = view.data.config; setView({ name: "round", config: { ...c, roundLength } }); };

  return (
    <div className="app-root" ref={rootRef}>
      <div className="stage">
        {view.name === "home" &&
          <HomeScreen onStart={startRound} progress={progress} themeId={themeId} onCycleTheme={cycleTheme} beep={beep} />}
        {view.name === "round" &&
          <RoundScreen key={JSON.stringify(view.config) + Math.random()} config={view.config} onFinish={finishRound} onExit={() => setView({ name: "home" })} beep={beep} />}
        {view.name === "results" &&
          <ResultsScreen data={view.data} onReplay={replay} onHome={() => setView({ name: "home" })} beep={beep} />}
      </div>
    </div>
  );
}

ReactDOM.createRoot(document.getElementById("root")).render(<App />);

      if (!deferredPrompt) return;
      deferredPrompt.prompt();
      const { outcome } = await deferredPrompt.userChoice;
      if (outcome === 'accepted') installBtn.style.display = 'none';
      deferredPrompt = null;
